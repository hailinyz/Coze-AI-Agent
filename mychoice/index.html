<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的未来我做主</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --primary: #4F46E5;
    --primary-light: #6366F1;
    --primary-dark: #3730A3;
    --accent: #F59E0B;
    --bg: #0F172A;
    --bg-card: #1E293B;
    --bg-input: #334155;
    --text: #F1F5F9;
    --text-muted: #94A3B8;
    --user-bubble: #4F46E5;
    --ai-bubble: #1E293B;
    --border: #334155;
    --success: #10B981;
    --error: #EF4444;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
  }

  .stars-bg {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
    overflow: hidden;
    pointer-events: none;
  }
  .star {
    position: absolute;
    width: 2px; height: 2px;
    background: #fff;
    border-radius: 50%;
    animation: twinkle var(--dur) ease-in-out infinite;
    opacity: 0;
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0.1; }
    50% { opacity: 0.8; }
  }

  .app-container {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    height: 100vh;
    max-width: 860px;
    margin: 0 auto;
  }

  .app-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    background: rgba(15, 23, 42, 0.85);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
  }
  .app-title {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .app-title .icon { font-size: 28px; }
  .app-title h1 {
    font-size: 20px;
    font-weight: 700;
    background: linear-gradient(135deg, #818CF8, #F59E0B);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header-actions { display: flex; gap: 8px; }
  .btn-icon {
    width: 36px; height: 36px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--bg-card);
    color: var(--text-muted);
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }
  .btn-icon:hover {
    border-color: var(--primary);
    color: var(--primary-light);
  }

  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    scroll-behavior: smooth;
  }
  .chat-area::-webkit-scrollbar { width: 5px; }
  .chat-area::-webkit-scrollbar-track { background: transparent; }
  .chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

  .welcome-card {
    text-align: center;
    padding: 40px 20px;
    animation: fadeUp 0.6s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .welcome-card .big-icon { font-size: 56px; margin-bottom: 16px; }
  .welcome-card h2 { font-size: 22px; margin-bottom: 8px; color: var(--text); }
  .welcome-card p {
    color: var(--text-muted);
    font-size: 14px;
    line-height: 1.6;
    max-width: 400px;
    margin: 0 auto 24px;
  }
  .quick-starts {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    max-width: 480px;
    margin: 0 auto;
  }
  .quick-btn {
    padding: 8px 16px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--bg-card);
    color: var(--text-muted);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .quick-btn:hover {
    border-color: var(--primary);
    color: var(--primary-light);
    background: rgba(79, 70, 229, 0.1);
  }

  .message {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
    animation: msgIn 0.3s ease;
  }
  @keyframes msgIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .message.user { flex-direction: row-reverse; }
  .avatar {
    width: 36px; height: 36px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }
  .message.ai .avatar { background: linear-gradient(135deg, #6366F1, #818CF8); }
  .message.user .avatar { background: linear-gradient(135deg, #F59E0B, #FBBF24); }
  .bubble {
    max-width: 75%;
    padding: 12px 16px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.7;
    word-break: break-word;
  }
  .message.ai .bubble {
    background: var(--ai-bubble);
    border: 1px solid var(--border);
    border-top-left-radius: 4px;
    color: var(--text);
  }
  .message.user .bubble {
    background: var(--user-bubble);
    border-top-right-radius: 4px;
    color: #fff;
  }

  .typing-indicator { display: flex; gap: 4px; padding: 4px 0; }
  .typing-indicator span {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--text-muted);
    animation: bounce 1.2s infinite;
  }
  .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }

  .message.error .bubble {
    background: rgba(239, 68, 68, 0.15);
    border: 1px solid rgba(239, 68, 68, 0.3);
    color: #FCA5A5;
  }

  .input-area {
    padding: 12px 16px 20px;
    background: rgba(15, 23, 42, 0.85);
    backdrop-filter: blur(12px);
    border-top: 1px solid var(--border);
  }
  .input-row { display: flex; gap: 10px; align-items: flex-end; }
  .input-wrapper { flex: 1; position: relative; }
  .input-wrapper textarea {
    width: 100%;
    padding: 12px 16px;
    border-radius: 14px;
    border: 1px solid var(--border);
    background: var(--bg-input);
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
    resize: none;
    outline: none;
    max-height: 120px;
    min-height: 44px;
    line-height: 1.5;
    transition: border-color 0.2s;
  }
  .input-wrapper textarea::placeholder { color: var(--text-muted); }
  .input-wrapper textarea:focus { border-color: var(--primary); }
  .send-btn {
    width: 44px; height: 44px;
    border-radius: 14px;
    border: none;
    background: var(--primary);
    color: #fff;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .send-btn:hover { background: var(--primary-light); }
  .send-btn:disabled {
    background: var(--bg-input);
    color: var(--text-muted);
    cursor: not-allowed;
  }
  .input-hint {
    text-align: center;
    margin-top: 6px;
    font-size: 11px;
    color: var(--text-muted);
    opacity: 0.6;
  }

  .sidebar-overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.5);
    z-index: 100;
    opacity: 0;
    visibility: hidden;
    transition: all 0.3s;
  }
  .sidebar-overlay.open { opacity: 1; visibility: visible; }
  .sidebar {
    position: fixed;
    top: 0; right: -320px;
    width: 300px; height: 100%;
    background: var(--bg-card);
    border-left: 1px solid var(--border);
    z-index: 101;
    transition: right 0.3s ease;
    display: flex;
    flex-direction: column;
  }
  .sidebar.open { right: 0; }
  .sidebar-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .sidebar-header h3 { font-size: 16px; }
  .sidebar-body { flex: 1; overflow-y: auto; padding: 20px; }
  .sidebar-section { margin-bottom: 24px; }
  .sidebar-section h4 {
    font-size: 13px;
    color: var(--primary-light);
    margin-bottom: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .sidebar-section p { font-size: 13px; line-height: 1.7; color: var(--text-muted); }
  .sidebar-section ul { list-style: none; padding: 0; }
  .sidebar-section li {
    font-size: 13px;
    color: var(--text-muted);
    padding: 6px 0;
    padding-left: 16px;
    position: relative;
  }
  .sidebar-section li::before {
    content: '✦';
    position: absolute;
    left: 0;
    color: var(--accent);
    font-size: 10px;
  }
  .clear-btn {
    width: 100%;
    padding: 10px;
    border-radius: 10px;
    border: 1px solid var(--error);
    background: transparent;
    color: var(--error);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .clear-btn:hover { background: rgba(239, 68, 68, 0.1); }

  .toast {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(-80px);
    padding: 10px 20px;
    border-radius: 10px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 13px;
    z-index: 200;
    transition: transform 0.3s ease;
    pointer-events: none;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  @media (max-width: 600px) {
    .app-header { padding: 12px 14px; }
    .app-title h1 { font-size: 17px; }
    .chat-area { padding: 16px 10px; }
    .bubble { max-width: 85%; font-size: 13.5px; }
    .input-area { padding: 10px 10px 16px; }
    .sidebar { width: 260px; right: -280px; }
    .quick-starts { gap: 6px; }
    .quick-btn { font-size: 12px; padding: 6px 12px; }
  }
</style>
</head>
<body>

<div class="stars-bg" id="starsBg"></div>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar(false)"></div>

<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <h3>🧭 指南</h3>
    <button class="btn-icon" onclick="toggleSidebar(false)">✕</button>
  </div>
  <div class="sidebar-body">
    <div class="sidebar-section">
      <h4>关于</h4>
      <p>「我的未来我做主」是你的未来规划助手。无论你想探讨职业方向、人生目标，还是想梳理当下的选择，都可以和 AI 深入对话。</p>
    </div>
    <div class="sidebar-section">
      <h4>你可以聊</h4>
      <ul>
        <li>未来5年的职业规划</li>
        <li>如何突破当下的瓶颈</li>
        <li>学业与生活的平衡</li>
        <li>想实现的梦想与行动计划</li>
        <li>任何关于未来的思考</li>
      </ul>
    </div>
    <div class="sidebar-section">
      <h4>操作</h4>
      <button class="clear-btn" onclick="clearChat()">🗑 清空对话记录</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="app-container">
  <header class="app-header">
    <div class="app-title">
      <span class="icon">🌟</span>
      <h1>我的未来我做主</h1>
    </div>
    <div class="header-actions">
      <button class="btn-icon" onclick="toggleSidebar(true)" title="指南">☰</button>
    </div>
  </header>

  <div class="chat-area" id="chatArea">
    <div class="welcome-card" id="welcomeCard">
      <div class="big-icon">🚀</div>
      <h2>未来的路，从这里开始</h2>
      <p>和我聊聊你的梦想、目标与困惑，一起规划属于你的未来蓝图。</p>
      <div class="quick-starts">
        <button class="quick-btn" onclick="sendQuick('我想聊聊我的职业规划')">💼 聊聊职业规划</button>
        <button class="quick-btn" onclick="sendQuick('帮我制定一个未来5年的目标计划')">🎯 5年目标计划</button>
        <button class="quick-btn" onclick="sendQuick('我现在有点迷茫，想和你聊聊')">🌈 迷茫时聊聊</button>
        <button class="quick-btn" onclick="sendQuick('我想了解自己的优势和发展方向')">🔍 发现我的优势</button>
      </div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-row">
      <div class="input-wrapper">
        <textarea id="msgInput" rows="1" placeholder="说说你对未来的想法..."
                  onkeydown="handleKeydown(event)" oninput="autoResize(this)"></textarea>
      </div>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>➤</button>
    </div>
    <div class="input-hint">按 Enter 发送，Shift+Enter 换行</div>
  </div>
</div>

<script>
// ===== 星空背景生成 =====
(function initStars() {
  const container = document.getElementById('starsBg');
  const count = 80;
  for (let i = 0; i < count; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    star.style.left = Math.random() * 100 + '%';
    star.style.top = Math.random() * 100 + '%';
    star.style.setProperty('--dur', (2 + Math.random() * 4) + 's');
    star.style.animationDelay = Math.random() * 4 + 's';
    star.style.width = star.style.height = (1 + Math.random() * 2) + 'px';
    container.appendChild(star);
  }
})();

// ===== 状态 =====
let isLoading = false;
const chatArea = document.getElementById('chatArea');
const msgInput = document.getElementById('msgInput');
const sendBtn = document.getElementById('sendBtn');
const welcomeCard = document.getElementById('welcomeCard');

// ===== 输入框自适应高度 =====
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  sendBtn.disabled = el.value.trim() === '';
}

// ===== 键盘事件 =====
function handleKeydown(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    if (!sendBtn.disabled && !isLoading) sendMessage();
  }
}

// ===== 发送消息 =====
async function sendMessage() {
  const text = msgInput.value.trim();
  if (!text || isLoading) return;

  if (welcomeCard) welcomeCard.style.display = 'none';

  appendMessage('user', text);
  msgInput.value = '';
  msgInput.style.height = 'auto';
  sendBtn.disabled = true;

  isLoading = true;
  const typingEl = appendTyping();

  try {
    const res = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text })
    });
    const data = await res.json();

    typingEl.remove();

    if (data.status === 'success') {
      appendMessage('ai', data.content);
    } else {
      appendMessage('error', '出了点问题：' + (data.content || '未知错误'));
    }
  } catch (err) {
    typingEl.remove();
    appendMessage('error', '网络异常，请检查后端服务是否启动');
  }

  isLoading = false;
}

// ===== 快捷发送 =====
function sendQuick(text) {
  msgInput.value = text;
  sendBtn.disabled = false;
  sendMessage();
}

// ===== 添加消息 =====
function appendMessage(type, content) {
  const div = document.createElement('div');
  div.className = 'message ' + type;
  const avatarIcon = type === 'user' ? '🙋' : '🤖';
  div.innerHTML = `
    <div class="avatar">${avatarIcon}</div>
    <div class="bubble">${escapeHtml(content)}</div>
  `;
  chatArea.appendChild(div);
  scrollToBottom();
}

// ===== 加载动画 =====
function appendTyping() {
  const div = document.createElement('div');
  div.className = 'message ai';
  div.innerHTML = `
    <div class="avatar">🤖</div>
    <div class="bubble">
      <div class="typing-indicator">
        <span></span><span></span><span></span>
      </div>
    </div>
  `;
  chatArea.appendChild(div);
  scrollToBottom();
  return div;
}

// ===== 滚动到底部 =====
function scrollToBottom() {
  requestAnimationFrame(() => {
    chatArea.scrollTop = chatArea.scrollHeight;
  });
}

// ===== HTML转义 =====
function escapeHtml(text) {
  const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
  return text.replace(/[&<>"']/g, m => map[m]);
}

// ===== 侧边栏 =====
function toggleSidebar(open) {
  document.getElementById('sidebar').classList.toggle('open', open);
  document.getElementById('sidebarOverlay').classList.toggle('open', open);
}

// ===== 清空对话 =====
function clearChat() {
  chatArea.innerHTML = '';
  welcomeCard && chatArea.appendChild(welcomeCard);
  welcomeCard && (welcomeCard.style.display = '');
  toggleSidebar(false);
  showToast('对话已清空');
}

// ===== Toast =====
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

msgInput.focus();
</script>
</body>
</html>
