<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>成语接龙</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', Arial, sans-serif;
            background: #f3f4f9;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .game-container {
            background: #fff;
            border-radius: 18px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.10);
            padding: 36px 24px 28px 24px;
            max-width: 420px;
            width: 100%;
            border: 1px solid #ececec;
        }
        .game-title {
            text-align: center;
            font-size: 28px;
            color: #2d2d2d;
            margin-bottom: 24px;
            font-weight: 600;
            letter-spacing: 2px;
        }
        .current-section {
            background: #f7f8fa;
            border-radius: 12px;
            padding: 18px 0 14px 0;
            margin-bottom: 18px;
            text-align: center;
            border: 1px solid #e6e8ee;
        }
        .current-label {
            font-size: 13px;
            color: #888;
            margin-bottom: 8px;
        }
        .current-idiom {
            font-size: 36px;
            font-weight: 700;
            color: #3a5ad7;
            letter-spacing: 10px;
        }

        .input-section {
            margin-bottom: 18px;
        }

        .input-hint {
            font-size: 13px;
            color: #aaa;
            margin-bottom: 8px;
            text-align: center;
        }

        .input-wrapper {
            display: flex;
            gap: 8px;
        }

        .idiom-input {
            flex: 1;
            padding: 12px 16px;
            font-size: 20px;
            border: 1.5px solid #e0e0e0;
            border-radius: 8px;
            outline: none;
            transition: border-color 0.2s;
            text-align: center;
            letter-spacing: 4px;
        }

        .idiom-input:focus {
            border-color: #3a5ad7;
        }

        .idiom-input::placeholder {
            letter-spacing: 2px;
            color: #c2c2c2;
        }

        .submit-btn {
            padding: 12px 22px;
            font-size: 16px;
            font-weight: 500;
            color: #fff;
            background: #3a5ad7;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s, box-shadow 0.2s;
        }

        .submit-btn:hover {
            background: #2d47a8;
            box-shadow: 0 2px 8px rgba(58,90,215,0.10);
        }

        .submit-btn:active {
            background: #3a5ad7;
        }

        .submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .message {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 16px;
            text-align: center;
            font-size: 14px;
            display: none;
        }

        .message.error {
            background: #fff2f0;
            color: #d4380d;
            border: 1px solid #ffd6cc;
            display: block;
        }

        .message.success {
            background: #f6ffed;
            color: #389e0d;
            border: 1px solid #b7eb8f;
            display: block;
        }

        .history-section {
            border-top: 1px solid #f0f0f0;
            padding-top: 16px;
        }

        .history-title {
            font-size: 15px;
            color: #444;
            margin-bottom: 10px;
            font-weight: 500;
        }

        .history-list {
            max-height: 200px;
            overflow-y: auto;
        }

        .history-item {
            display: flex;
            align-items: center;
            padding: 10px 8px;
            background: #f7f8fa;
            border-radius: 6px;
            margin-bottom: 6px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .history-item .user-idiom {
            color: #3a5ad7;
            font-weight: 600;
            font-size: 17px;
        }

        .history-item .arrow {
            margin: 0 10px;
            color: #bbb;
            font-size: 18px;
        }

        .history-item .ai-idiom {
            color: #2d47a8;
            font-weight: 600;
            font-size: 17px;
        }

        .history-item .timestamp {
            margin-left: auto;
            font-size: 12px;
            color: #bdbdbd;
        }

        .empty-history {
            text-align: center;
            color: #bdbdbd;
            padding: 18px 0;
            font-size: 14px;
        }

        .loading {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2.5px solid rgba(58,90,215,0.15);
            border-radius: 50%;
            border-top-color: #3a5ad7;
            animation: spin 1s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .reset-btn {
            display: block;
            width: 100%;
            margin-top: 10px;
            padding: 10px 0;
            font-size: 14px;
            color: #888;
            background: #f7f8fa;
            border: 1px solid #e0e0e0;
            border-radius: 7px;
            cursor: pointer;
            transition: background 0.2s, border 0.2s, color 0.2s;
        }

        .reset-btn:hover {
            color: #3a5ad7;
            border-color: #3a5ad7;
            background: #f0f4ff;
        }

        @media (max-width: 600px) {
            .game-container {
                padding: 18px 4vw 12px 4vw;
                max-width: 98vw;
            }
            .current-idiom {
                font-size: 26px;
                letter-spacing: 6px;
            }
            .game-title {
                font-size: 20px;
            }
        }
        
    </style>
</head>
<body>
    <div class="game-container">
        <h1 class="game-title">🎯 成语接龙</h1>
        
        <div class="current-section">
            <div class="current-label">当前成语</div>
            <div class="current-idiom" id="currentIdiom">一心一意</div>
        </div>

        <div class="message" id="message"></div>

        <div class="input-section">
            <div class="input-hint">你好毛毛请输入以上面成语最后一个字开头的成语</div>
            <div class="input-wrapper">
                <input type="text" 
                       class="idiom-input" 
                       id="idiomInput" 
                       placeholder="输入成语"
                       maxlength="4"
                       autocomplete="off">
                <button class="submit-btn" id="submitBtn">接龙</button>
            </div>
        </div>

        <div class="history-section">
            <div class="history-title">📜 接龙记录</div>
            <div class="history-list" id="historyList">
                <div class="empty-history">还没有接龙记录，快来开始吧！</div>
            </div>
            <button class="reset-btn" id="resetBtn">🔄 重新开始</button>
        </div>
    </div>

    <script>
        // API 基础地址（使用相对路径，前后端同服务器）
        const API_BASE = '';

        // 获取DOM元素
        const currentIdiomEl = document.getElementById('currentIdiom');
        const idiomInput = document.getElementById('idiomInput');
        const submitBtn = document.getElementById('submitBtn');
        const messageEl = document.getElementById('message');
        const historyList = document.getElementById('historyList');
        const resetBtn = document.getElementById('resetBtn');

        // 显示消息
        function showMessage(text, type) {
            messageEl.textContent = text;
            messageEl.className = 'message ' + type;
            setTimeout(() => {
                messageEl.className = 'message';
            }, 3000);
        }

        // 更新历史记录列表
        function updateHistory(history) {
            if (!history || history.length === 0) {
                historyList.innerHTML = '<div class="empty-history">还没有接龙记录，快来开始吧！</div>';
                return;
            }

            historyList.innerHTML = history.map(item => `
                <div class="history-item">
                    <span class="user-idiom">${item.user}</span>
                    <span class="arrow">→</span>
                    <span class="ai-idiom">${item.ai}</span>
                    <span class="timestamp">${item.timestamp}</span>
                </div>
            `).join('');
        }

        // 设置加载状态
        function setLoading(loading) {
            submitBtn.disabled = loading;
            submitBtn.innerHTML = loading 
                ? '<span class="loading"></span>思考中' 
                : '接龙';
        }

        // 提交成语
        async function submitIdiom() {
            const idiom = idiomInput.value.trim();
            
            if (!idiom) {
                showMessage('请输入成语', 'error');
                return;
            }

            if (idiom.length !== 4) {
                showMessage('请输入4字成语', 'error');
                return;
            }

            setLoading(true);
            messageEl.className = 'message';

            try {
                const response = await fetch(`${API_BASE}/api/play`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ idiom: idiom })
                });

                const data = await response.json();

                if (data.error) {
                    showMessage(data.error, 'error');
                } else if (data.success) {
                    currentIdiomEl.textContent = data.current_idiom;
                    showMessage(`太棒了！AI接：${data.sdk_response}`, 'success');
                    idiomInput.value = '';
                    updateHistory(data.history);
                } else {
                    showMessage(data.error || '出错了，请重试', 'error');
                }
            } catch (error) {
                showMessage('网络错误，请检查后端服务是否启动', 'error');
                console.error('Error:', error);
            } finally {
                setLoading(false);
            }
        }

        // 重置游戏
        async function resetGame() {
            try {
                const response = await fetch(`${API_BASE}/api/reset`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    }
                });
                const data = await response.json();
                if (data.success) {
                    currentIdiomEl.textContent = data.current_idiom;
                    historyList.innerHTML = '<div class="empty-history">还没有接龙记录，快来开始吧！</div>';
                    showMessage('游戏已重置！', 'success');
                }
            } catch (error) {
                console.error('Reset error:', error);
                showMessage('重置失败，请重试', 'error');
            }
        }

        // 事件绑定
        submitBtn.addEventListener('click', submitIdiom);
        resetBtn.addEventListener('click', resetGame);

        idiomInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                submitIdiom();
            }
        });

        // 初始化聚焦输入框
        idiomInput.focus();
    </script>
</body>
</html>
