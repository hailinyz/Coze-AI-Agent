<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>历史老师 - 历史图片生成</title>
    
    <!-- Google Fonts - 思源宋体 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* ========== 全局样式 ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Serif SC', 'Songti SC', 'SimSun', serif;
            background-color: #f5f0e8;
            background-image: 
                radial-gradient(ellipse at 20% 30%, rgba(192, 57, 43, 0.03) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 70%, rgba(192, 57, 43, 0.03) 0%, transparent 50%);
            min-height: 100vh;
            color: #2c2c2c;
            padding: 20px;
        }

        /* ========== 主容器 ========== */
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* ========== 标题区域 - 古卷风格 ========== */
        .header {
            text-align: center;
            margin-bottom: 50px;
            position: relative;
        }

        /* 装饰性横线 */
        .header::before,
        .header::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 80px;
            height: 2px;
            background: linear-gradient(to right, transparent, #c0392b, transparent);
        }

        .header::before {
            left: 10%;
        }

        .header::after {
            right: 10%;
        }

        .title {
            font-size: 3.5rem;
            font-weight: 700;
            color: #2c2c2c;
            letter-spacing: 0.3em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
            margin-bottom: 10px;
            position: relative;
            display: inline-block;
        }

        /* 标题朱红装饰点 */
        .title::before,
        .title::after {
            content: '◆';
            color: #c0392b;
            font-size: 1rem;
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
        }

        .title::before {
            left: -30px;
        }

        .title::after {
            right: -30px;
        }

        .subtitle {
            font-size: 1rem;
            color: #666;
            letter-spacing: 0.2em;
        }

        /* ========== 输入区域 - 古籍边框 ========== */
        .input-section {
            background: linear-gradient(135deg, #faf8f5 0%, #f0ebe0 100%);
            border: 3px solid #8b2500;
            border-radius: 4px;
            padding: 30px;
            margin-bottom: 40px;
            position: relative;
            box-shadow: 
                0 4px 20px rgba(0, 0, 0, 0.08),
                inset 0 0 30px rgba(139, 37, 0, 0.03);
        }

        /* 角落装饰 */
        .input-section::before,
        .input-section::after {
            content: '❀';
            color: #c0392b;
            font-size: 1.2rem;
            position: absolute;
        }

        .input-section::before {
            top: 10px;
            left: 15px;
        }

        .input-section::after {
            bottom: 10px;
            right: 15px;
        }

        .input-wrapper {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .input-field {
            flex: 1;
            min-width: 250px;
            padding: 15px 20px;
            font-size: 1.1rem;
            font-family: 'Noto Serif SC', serif;
            border: 2px solid #d4c4a8;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.7);
            color: #2c2c2c;
            transition: all 0.3s ease;
        }

        .input-field:focus {
            outline: none;
            border-color: #c0392b;
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 0 15px rgba(192, 57, 43, 0.15);
        }

        .input-field::placeholder {
            color: #999;
            font-style: italic;
        }

        /* 生成按钮 */
        .generate-btn {
            padding: 15px 40px;
            font-size: 1.1rem;
            font-family: 'Noto Serif SC', serif;
            font-weight: 600;
            color: #fff;
            background: linear-gradient(135deg, #c0392b 0%, #8b2500 100%);
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            letter-spacing: 0.1em;
        }

        .generate-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(192, 57, 43, 0.4);
        }

        .generate-btn:active:not(:disabled) {
            transform: translateY(0);
        }

        .generate-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        /* 按钮loading状态 */
        .generate-btn.loading::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            top: 50%;
            left: 50%;
            margin: -10px 0 0 -10px;
            border: 2px solid transparent;
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .generate-btn.loading span {
            visibility: hidden;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ========== 图片展示区 ========== */
        .gallery {
            display: none;
            flex-direction: column;
            gap: 30px;
        }

        .gallery.active {
            display: flex;
        }

        .image-row {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .image-wrapper {
            width: 100%;
            max-width: 800px;
            aspect-ratio: 9 / 16;
            background: linear-gradient(135deg, #e8e0d0 0%, #d8d0c0 100%);
            border: 4px solid #8b2500;
            border-radius: 4px;
            overflow: hidden;
            position: relative;
            box-shadow: 
                0 4px 15px rgba(0, 0, 0, 0.1),
                inset 0 0 20px rgba(139, 37, 0, 0.05);
        }

        /* 中式云纹角落装饰 */
        .image-wrapper::before,
        .image-wrapper::after {
            content: '☁';
            color: rgba(139, 37, 0, 0.3);
            font-size: 2rem;
            position: absolute;
            z-index: 2;
        }

        .image-wrapper::before {
            top: 5px;
            left: 10px;
        }

        .image-wrapper::after {
            bottom: 5px;
            right: 10px;
        }

        .image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 0.8s ease;
        }

        .image-wrapper img.loaded {
            opacity: 1;
        }

        /* 加载动画 - 水墨晕染效果 */
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #e8e0d0 0%, #d8d0c0 100%);
            z-index: 1;
        }

        .loading-overlay.active {
            display: flex;
        }

        .ink-ripple {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(139, 37, 0, 0.4) 0%, transparent 70%);
            animation: inkSpread 1.5s ease-in-out infinite;
        }

        @keyframes inkSpread {
            0% {
                transform: scale(0.5);
                opacity: 1;
            }
            100% {
                transform: scale(2);
                opacity: 0;
            }
        }

        .image-caption {
            margin-top: 12px;
            font-size: 1rem;
            color: #666;
            letter-spacing: 0.1em;
            position: relative;
            padding: 0 30px;
        }

        .image-caption::before,
        .image-caption::after {
            content: '—';
            color: #c0392b;
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
        }

        .image-caption::before {
            left: 0;
        }

        .image-caption::after {
            right: 0;
        }

        /* ========== 错误提示 ========== */
        .error-message {
            display: none;
            text-align: center;
            padding: 20px;
            margin-top: 30px;
            background: rgba(192, 57, 43, 0.1);
            border: 1px solid #c0392b;
            border-radius: 4px;
            color: #8b2500;
        }

        .error-message.active {
            display: block;
        }

        /* ========== 响应式设计 ========== */
        @media (max-width: 768px) {
            .title {
                font-size: 2.5rem;
                letter-spacing: 0.2em;
            }

            .title::before,
            .title::after {
                display: none;
            }

            .header::before,
            .header::after {
                width: 40px;
            }

            .container {
                padding: 20px 15px;
            }

            .input-section {
                padding: 20px 15px;
            }

            .input-wrapper {
                flex-direction: column;
            }

            .generate-btn {
                width: 100%;
            }

            .image-wrapper {
                aspect-ratio: 9 / 16;
            }
        }

        /* ========== 古籍边缘装饰 ========== */
        .page-decoration {
            position: fixed;
            top: 0;
            bottom: 0;
            width: 30px;
            pointer-events: none;
        }

        .page-decoration.left {
            left: 0;
            background: linear-gradient(to right, 
                rgba(139, 37, 0, 0.1) 0%, 
                transparent 100%);
        }

        .page-decoration.right {
            right: 0;
            background: linear-gradient(to left, 
                rgba(139, 37, 0, 0.1) 0%, 
                transparent 100%);
        }

        @media (max-width: 768px) {
            .page-decoration {
                display: none;
            }
        }
    </style>
</head>
<body>
    <!-- 页面边缘装饰 -->
    <div class="page-decoration left"></div>
    <div class="page-decoration right"></div>

    <div class="container">
        <!-- 标题区域 -->
        <header class="header">
            <h1 class="title">历史老师</h1>
            <p class="subtitle">穿越时光，探索历史</p>
        </header>

        <!-- 输入区域 -->
        <section class="input-section">
            <div class="input-wrapper">
                <input 
                    type="text" 
                    id="topicInput" 
                    class="input-field" 
                    placeholder="输入一个历史主题，如：唐朝长安城"
                    maxlength="100"
                    autocomplete="off"
                >
                <button id="generateBtn" class="generate-btn">
                    <span>生成图片</span>
                </button>
            </div>
        </section>

        <!-- 错误提示 -->
        <div id="errorMessage" class="error-message">
            抱歉，请求失败，请稍后重试
        </div>

        <!-- 图片展示区 -->
        <section id="gallery" class="gallery">
            <!-- 第一行图片 -->
            <div class="image-row">
                <div class="image-wrapper">
                    <div id="loading1" class="loading-overlay active">
                        <div class="ink-ripple"></div>
                    </div>
                    <img id="image1" src="" alt="历史图片1">
                </div>
                <p class="image-caption">第一张</p>
            </div>

            <!-- 第二行图片 -->
            <div class="image-row">
                <div class="image-wrapper">
                    <div id="loading2" class="loading-overlay active">
                        <div class="ink-ripple"></div>
                    </div>
                    <img id="image2" src="" alt="历史图片2">
                </div>
                <p class="image-caption">第二张</p>
            </div>
        </section>
    </div>

    <script>
        /**
         * 历史老师 - 前端交互逻辑
         * 处理图片生成请求、加载状态、错误提示等
         */

        // DOM 元素引用
        const topicInput = document.getElementById('topicInput');
        const generateBtn = document.getElementById('generateBtn');
        const gallery = document.getElementById('gallery');
        const errorMessage = document.getElementById('errorMessage');
        const image1 = document.getElementById('image1');
        const image2 = document.getElementById('image2');
        const loading1 = document.getElementById('loading1');
        const loading2 = document.getElementById('loading2');

        /**
         * 显示错误提示
         */
        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('active');
        }

        /**
         * 隐藏错误提示
         */
        function hideError() {
            errorMessage.classList.remove('active');
        }

        /**
         * 显示加载状态
         */
        function showLoading() {
            // 隐藏图库，清空旧图片
            gallery.classList.remove('active');
            image1.classList.remove('loaded');
            image2.classList.remove('loaded');
            image1.src = '';
            image2.src = '';
            
            // 显示loading动画
            loading1.classList.add('active');
            loading2.classList.add('active');
            
            // 隐藏错误
            hideError();
            
            // 禁用按钮
            generateBtn.disabled = true;
            generateBtn.classList.add('loading');
        }

        /**
         * 隐藏加载状态
         */
        function hideLoading() {
            loading1.classList.remove('active');
            loading2.classList.remove('active');
            
            // 启用按钮
            generateBtn.disabled = false;
            generateBtn.classList.remove('loading');
        }

        /**
         * 显示生成的图片
         * @param {string[]} images - 图片URL数组
         */
        function displayImages(images) {
            // 显示图库容器
            gallery.classList.add('active');
            
            // 设置图片并添加加载完成事件
            if (images && images.length > 0) {
                // 第一张图片
                image1.src = images[0];
                image1.onload = function() {
                    this.classList.add('loaded');
                };
                
                // 第二张图片（如果有）
                if (images.length > 1) {
                    image2.src = images[1];
                    image2.onload = function() {
                        this.classList.add('loaded');
                    };
                } else {
                    image2.src = '';
                }
            }
        }

        /**
         * 生成图片的核心函数
         */
        async function generateImages() {
            const topic = topicInput.value.trim();
            
            // 验证输入
            if (!topic) {
                showError('请输入历史主题');
                return;
            }

            // 显示加载状态
            showLoading();

            try {
                // 发送请求到后端
                const response = await fetch('/generate_images', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ input: topic })
                });

                // 检查响应状态
                if (!response.ok) {
                    throw new Error(`服务器错误: ${response.status}`);
                }

                const data = await response.json();
                
                // 隐藏loading，显示图片
                hideLoading();
                
                if (data.images && data.images.length > 0) {
                    displayImages(data.images);
                } else {
                    showError('未生成任何图片，请尝试其他主题');
                }

            } catch (error) {
                console.error('生成图片失败:', error);
                hideLoading();
                showError('网络连接失败，请检查网络后重试');
            }
        }

        // ========== 事件绑定 ==========

        // 点击生成按钮
        generateBtn.addEventListener('click', generateImages);

        // 输入框回车触发生成
        topicInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                generateImages();
            }
        });

        // 输入时清除错误提示
        topicInput.addEventListener('input', hideError);

        // 图片加载错误处理
        image1.onerror = function() {
            this.classList.add('loaded');
        };
        image2.onerror = function() {
            this.classList.add('loaded');
        };
    </script>
</body>
</html>
